global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "gamers-api"
    static_configs:
      - targets: ["web-app:8080"]
    metrics_path: /metrics

  - job_name: "mysql"
    static_configs:
      - targets: ["gamers-mysql-exporter:9104"]

  - job_name: "redis"
    static_configs:
      - targets: ["gamers-redis-exporter:9121"]

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["gamers-rabbitmq:15692"]
    metrics_path: /metrics
