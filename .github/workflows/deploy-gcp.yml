name: Deploy to GCP Compute Engine

on:
  push:
    branches:
      - main
    paths:
      - 'docker-compose.yaml'
      - 'deploy.sh'
      - 'init-letsencrypt.sh'
      - 'renew-cert.sh'
      - 'mysql/init/**'
      - 'nginx/**'
      - '.github/workflows/deploy-gcp.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Docker Compose to GCP VM
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to GCP VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_PROD_HOST }}
          username: ${{ secrets.GCP_VM_PROD_USER }}
          key: ${{ secrets.GCP_VM_PROD_SSH_KEY }}
          port: 22
          source: "docker-compose.yaml,deploy.sh,init-letsencrypt.sh,renew-cert.sh,Makefile,nginx,mysql"
          target: "GAMERS-INFRA"
          strip_components: 0

      - name: Execute SSH command to deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.GCP_VM_PROD_HOST }}
          username: ${{ secrets.GCP_VM_PROD_USER }}
          key: ${{ secrets.GCP_VM_PROD_SSH_KEY }}
          port: 22
          envs: GHCR_PAT,GITHUB_ACTOR,ENV_FILE
          script: |
            cd GAMERS-INFRA

            echo "📝 Generating .env file..."
            echo "$ENV_FILE" > .env
            echo "✅ .env file created."
            
            if [ -z "$GHCR_PAT" ]; then
              echo "❌ Error: GHCR_PAT secret is empty."
              exit 1
            fi
            
            echo "🔐 Logging in to GHCR..."
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            
            chmod +x deploy.sh
            ./deploy.sh
