name: Deploy to GCP Compute Engine (Staging & Production)

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'docker-compose.yaml'
      - 'deploy.sh'
      - 'init-letsencrypt.sh'
      - 'renew-cert.sh'
      - 'mysql/init/**'
      - 'nginx/**'
      - 'prometheus/**'
      - 'rabbitmq/**'
      - 'grafana/**'
      - '.github/workflows/deploy-gcp.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'docker-compose.yaml'
      - 'deploy.sh'
      - 'init-letsencrypt.sh'
      - 'renew-cert.sh'
      - 'mysql/init/**'
      - 'nginx/**'
      - 'prometheus/**'
      - 'rabbitmq/**'
      - 'grafana/**'
      - '.github/workflows/deploy-gcp.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name || github.base_ref }} Server
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set deployment environment
        id: set-env
        env:
          PROD_ENV_RAW: ${{ secrets.PROD_ENV_FILE }}
          STAGING_ENV_RAW: ${{ secrets.STAGING_ENV_FILE }}
          PROD_SSH_KEY: ${{ secrets.GCP_VM_PROD_SSH_KEY }}
          STAGING_SSH_KEY: ${{ secrets.GCP_VM_STAGING_SSH_KEY }}
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.event.pull_request.base.ref }}" == "main" ]]; then
            echo "HOST=${{ secrets.GCP_VM_PROD_HOST }}" >> $GITHUB_ENV
            echo "USER=${{ secrets.GCP_VM_PROD_USER }}" >> $GITHUB_ENV
            echo "TARGET_DIR=GAMERS-INFRA-PROD" >> $GITHUB_ENV
          
            # SSH_KEY 멀티라인 처리
            echo "SSH_KEY<<EOF" >> $GITHUB_ENV
            echo "$PROD_SSH_KEY" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          
            # ENV_FILE 멀티라인 처리
            echo "ENV_FILE<<EOF" >> $GITHUB_ENV
            echo "$PROD_ENV_RAW" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "HOST=${{ secrets.GCP_VM_STAGING_HOST }}" >> $GITHUB_ENV
            echo "USER=${{ secrets.GCP_VM_STAGING_USER }}" >> $GITHUB_ENV
            echo "TARGET_DIR=GAMERS-INFRA-STAGING" >> $GITHUB_ENV
          
            # SSH_KEY 멀티라인 처리
            echo "SSH_KEY<<EOF" >> $GITHUB_ENV
            echo "$STAGING_SSH_KEY" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          
            # ENV_FILE 멀티라인 처리
            echo "ENV_FILE<<EOF" >> $GITHUB_ENV
            echo "$STAGING_ENV_RAW" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Copy files to GCP VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USER }}
          key: ${{ env.SSH_KEY }}
          port: 22
          source: "docker-compose.yaml,deploy.sh,init-letsencrypt.sh,renew-cert.sh,Makefile,nginx,mysql,prometheus,rabbitmq,grafana"
          target: ${{ env.TARGET_DIR }}
          strip_components: 0

      - name: Execute SSH command to deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
          ENV_FILE: ${{ env.ENV_FILE }}
          TARGET_DIR: ${{ env.TARGET_DIR }}
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USER }}
          key: ${{ env.SSH_KEY }}
          port: 22
          envs: GHCR_PAT,GITHUB_ACTOR,ENV_FILE,TARGET_DIR
          script: |
            cd $TARGET_DIR

            echo "📝 Generating .env file..."
            echo "$ENV_FILE" > .env
            echo "✅ .env file created."
            
            if [ -z "$GHCR_PAT" ]; then
              echo "❌ Error: GHCR_PAT secret is empty."
              exit 1
            fi
            
            echo "🔐 Logging in to GHCR..."
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            
            chmod +x deploy.sh
            ./deploy.sh