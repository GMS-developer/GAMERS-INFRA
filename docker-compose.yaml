services:
  mysql:
    image: mysql:8.0
    container_name: gamers-mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: "Asia/Tokyo"
    ports:
      - "${DB_PORT}:3306"
    networks:
      - gamers-network
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      - --innodb-buffer-pool-size=256M
      - --max-connections=150
      - --thread-cache-size=8
      - --table-open-cache=256
    mem_limit: 768m
    mem_reservation: 256m

  redis:
    image: redis:7-alpine
    container_name: gamers-redis
    env_file:
      - .env
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: "Asia/Tokyo"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: [
      "redis-server",
      "--appendonly", "yes",
      "--requirepass", "${REDIS_PASSWORD}",
      "--maxmemory", "256mb",
      "--maxmemory-policy", "volatile-lru",
      "--save", ""
    ]
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gamers-network
    restart: unless-stopped
    mem_limit: 384m
    mem_reservation: 128m

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: gamers-rabbitmq
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_ENABLED_PLUGINS_FILE: /etc/rabbitmq/enabled_plugins
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: "0.6"
      TZ: "Asia/Tokyo"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    networks:
      - gamers-network

  gamers-migrator:
    image: ghcr.io/gms-developer/gamers-be:latest
    container_name: gamers-migrator
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./migrate-entrypoint.sh:/migrate-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/migrate-entrypoint.sh"]
    restart: on-failure
    networks:
      - gamers-network

  web-app:
    image: ghcr.io/gms-developer/gamers-be:latest
    container_name: gamers-web-server
    env_file:
      - .env
    expose:
      - "8080"
    depends_on:
      gamers-migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    networks:
      - gamers-network

  discord-bot:
    image: ghcr.io/gms-developer/gamers-bot:latest
    container_name: gamers-discord-bot
    env_file:
      - .env
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 32m
    networks:
      - gamers-network

  nginx:
    image: nginx:alpine
    container_name: gamers-nginx
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/certbot/webroot:/var/www/certbot:ro
      - ./nginx/ssl/certbot:/etc/letsencrypt:ro
      - ./nginx/static:/var/www/static:ro
    depends_on:
      - web-app
    networks:
      - gamers-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 64m
    mem_reservation: 16m

  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: gamers-certbot
    volumes:
      - ./nginx/ssl/certbot:/etc/letsencrypt
      - ./nginx/certbot/cloudflare.ini:/etc/cloudflare/cloudflare.ini:ro
    restart: "no"

  prometheus:
    image: prom/prometheus:latest
    container_name: gamers-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=1GB"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    networks:
      - gamers-network
    mem_limit: 384m
    mem_reservation: 128m

  grafana:
    image: grafana/grafana:latest
    container_name: gamers-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${DOMAIN}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - gamers-network
    mem_limit: 192m
    mem_reservation: 64m

  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: gamers-mysql-exporter
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATA_SOURCE_NAME=${DB_USER}:${DB_PASSWORD}@(gamers-mysql:3306)/
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gamers-network
    mem_limit: 64m
    mem_reservation: 16m

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: gamers-redis-exporter
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_ADDR=redis://gamers-redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gamers-network
    mem_limit: 64m
    mem_reservation: 16m

networks:
  gamers-network:
    external: true

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
